      $relationsFill.style.setProperty('--fill', expValue + '%');
    }
    if ($relationsTrackValue) {
      $relationsTrackValue.textContent = expValue + '/100';
    }

    var tensionValue = clamp(saveData.streamerStatus.tension);
    if ($tensionFill) {
      $tensionFill.style.setProperty('--fill', tensionValue + '%');
    }
    if ($tensionTrackValue) {
      $tensionTrackValue.textContent = Math.round(tensionValue) + '/100';
    }
    if ($liveValue) {
      $liveValue.textContent = formatNumber(saveData.streamerStatus.subscribers);
    }
    if ($earningsVal) {
      $earningsVal.textContent = formatNumber(saveData.streamerStatus.earnings);
    }
    // 방송 모드 인디케이터 갱신
    var $modeInd = document.getElementById('broadcast-mode-indicator');
    if ($modeInd && saveData.streamerStatus.isLive) {
      $modeInd.textContent = '● LIVE';
    }
  }

  // ── 1 초 틱 (백그라운드 탭 보정 포함) ──
  function gaugeTick() {
    var now = Date.now();
    var deltaSec = Math.floor((now - lastGaugeTickTime) / 1000);
    if (deltaSec <= 0) return;
    lastGaugeTickTime += deltaSec * 1000;

    deltaSec = Math.min(deltaSec, 3600);

    var ss = saveData.streamerStatus;
    var wasLiveAtStart = ss.isLive;
    var costumeBuff = getCostumeBuffs();

    if (ss.isLive && !liveSessionSnapshot) {
      startLiveSessionSnapshot();
    }

    for (var step = 0; step < deltaSec; step++) {
      if (ss.isLive) {
        if (ss.tension <= 0) {
          ss.isLive = false;
          continue;
        }

        var activeMode = getActiveMode(ss.tension, ss.broadcastMode || 'talk');
        ss.tension = clamp(ss.tension - GC.TENSION_DECAY_PER_SEC * activeMode.tensionMult * (1 - costumeBuff.tensionDecayDown) * TEST_TIME_SCALE);

        var earningsPerSec, subsPerSec;
        if (ss.tension >= 90) {
          earningsPerSec = GC.EARNINGS_FEVER_PER_SEC;
          subsPerSec = GC.SUBS_FEVER_PER_SEC;
        } else if (ss.tension >= 70) {
          earningsPerSec = GC.EARNINGS_HIGH_PER_SEC;
          subsPerSec = GC.SUBS_HIGH_PER_SEC;
        } else if (ss.tension >= 30) {
          earningsPerSec = GC.EARNINGS_MID_PER_SEC;
          subsPerSec = GC.SUBS_MID_PER_SEC;
        } else {
          earningsPerSec = GC.EARNINGS_LOW_PER_SEC;
          subsPerSec = GC.SUBS_LOW_PER_SEC;
        }

        var earnGain = earningsPerSec * activeMode.fundMult * (1 + costumeBuff.fundGain) * TEST_TIME_SCALE;
        var subsGain = subsPerSec * activeMode.subsMult * (1 + costumeBuff.subGain) * TEST_TIME_SCALE;
        fund_buffer += earnGain;
        sub_buffer += subsGain;
        var fundInt = Math.floor(fund_buffer);
        var subInt = Math.floor(sub_buffer);
        if (fundInt >= 1) { ss.earnings += fundInt; fund_buffer -= fundInt; }
        if (subInt >= 1) { ss.subscribers += subInt; sub_buffer -= subInt; }
      } else {
        ss.tension = clamp(ss.tension + GC.TENSION_REGEN_PER_SEC * TEST_TIME_SCALE);
      }
    }

    // 방송 중 텐션 0으로 강제 종료 감지
    if (wasLiveAtStart && !ss.isLive) {
      var forceReward = buildStopSettlementReward();
      liveSessionSnapshot = null;
      liveSessionStartAt = 0;
      fund_buffer = 0;
      sub_buffer = 0;
      if ($ledText) $ledText.textContent = '▶LIVE';
      if ($btnLive) $btnLive.classList.remove('is-live');
      exitLiveBroadcastView();
      showOfflineRewardPopup(forceReward, null, {
        title: '방송 정산',
        showDuration: true,
        showStatus: true
      });
    }

    // 눕방 상태 감지 (텐션 30 미만이면 눕방 이미지, 아닌면 캐릭터)
    if (ss.isLive) {
      var isNoopbang = ss.tension >= 1 && ss.tension < 30;
      var $noopbang = document.getElementById('noopbang-overlay');
      var $charWrap = document.querySelector('.character-wrapper');
      if ($noopbang) $noopbang.classList.toggle('show', isNoopbang);
      if ($charWrap) $charWrap.style.visibility = isNoopbang ? 'hidden' : 'visible';
    }

    updateGaugeUI();
  }

  // ── 방송 모드 선택 & 준비 화면 & 16:9 연출 ──
  var countdownInterval = null;
  var countdownTime = 60;
  var lastPrepClickTime = 0;
  var CLICK_COOLDOWN = 100;

  function openBroadcastModeModal() {
    document.getElementById('broadcast-mode-backdrop').classList.add('show');
  }

  function closeBroadcastModeModal() {
    document.getElementById('broadcast-mode-backdrop').classList.remove('show');
  }

  function startCountdown(mode) {
    saveData.streamerStatus.broadcastMode = mode;
    countdownTime = 30;
    lastPrepClickTime = 0;

    var $prep = document.getElementById('broadcast-prep-backdrop');
    var $cd = document.getElementById('broadcast-prep-countdown');
    var $ml = document.getElementById('broadcast-prep-mode-label');
    var $prepTitle = document.getElementById('broadcast-prep-title');
    var modeLabel = (BROADCAST_MODES[mode] || BROADCAST_MODES.talk).label;
    if ($ml) $ml.textContent = modeLabel;
    if ($prepTitle) $prepTitle.textContent = modeLabel + ' 방송 준비중...';
    $cd.textContent = countdownTime;
    $prep.classList.add('show');
    closeBroadcastModeModal();

    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(function() {
      countdownTime--;
      $cd.textContent = Math.max(0, countdownTime);
      if (countdownTime <= 0) {
        clearInterval(countdownInterval);
        countdownInterval = null;
        $prep.classList.remove('show');
        startBroadcast(mode);
      }
    }, 1000);
  }

  function handlePrepClick(e) {
    if (e.target.closest('.broadcast-prep-btns')) return;
    var now = Date.now();
    if (now - lastPrepClickTime < CLICK_COOLDOWN) return;
    lastPrepClickTime = now;
    countdownTime = Math.max(0, countdownTime - 1);
    var $cd = document.getElementById('broadcast-prep-countdown');
    if ($cd) $cd.textContent = Math.max(0, countdownTime);
  }

  function cancelCountdown() {
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
    document.getElementById('broadcast-prep-backdrop').classList.remove('show');
  }

  function goBackToModeSelect() {
    cancelCountdown();
    openBroadcastModeModal();
  }

  function startBroadcast(mode) {
    var ss = saveData.streamerStatus;
    ss.isLive = true;
    ss.broadcastMode = mode;
    fund_buffer = 0;
    sub_buffer = 0;
    startLiveSessionSnapshot();
    enterLiveBroadcastView(mode);
    if ($ledText) $ledText.textContent = '■STOP';
    if ($btnLive) $btnLive.classList.add('is-live');
  }

  function stopBroadcast() {
    gaugeTick();
    var ss = saveData.streamerStatus;
    var reward = buildStopSettlementReward();
    ss.isLive = false;
    liveSessionSnapshot = null;
    liveSessionStartAt = 0;
    fund_buffer = 0;
    sub_buffer = 0;
    if ($ledText) $ledText.textContent = '▶LIVE';
    if ($btnLive) $btnLive.classList.remove('is-live');
    exitLiveBroadcastView();
    showOfflineRewardPopup(reward, null, {
      title: '방송 정산',
      showDuration: true,
      showStatus: false
    });
  }

  function enterLiveBroadcastView(mode) {
    var $gc = document.getElementById('game-container');
    $gc.classList.add('live-broadcast');
    var $modeInd = document.getElementById('broadcast-mode-indicator');
    if ($modeInd) $modeInd.textContent = '● LIVE';
    updateLiveOverlays();
  }

  function exitLiveBroadcastView() {
    var $gc = document.getElementById('game-container');
    $gc.classList.remove('live-broadcast');
    // 캐릭터 클리핑 해제
    var $charWrap = document.querySelector('.character-wrapper');
    if ($charWrap) { $charWrap.style.clipPath = ''; $charWrap.style.visibility = 'visible'; }
    // 눕방 오버레이 해제
    var $noopbang = document.getElementById('noopbang-overlay');
    if ($noopbang) $noopbang.classList.remove('show');
  }

  function updateLiveOverlays() {
    var $gc = document.getElementById('game-container');
    var w = $gc.clientWidth;
    var h = $gc.clientHeight;
    var frameH = w * 9 / 16;
    var barH = Math.max(0, (h - frameH) / 2);
    var $top = document.getElementById('broadcast-dark-top');
    var $bot = document.getElementById('broadcast-dark-bottom');
    var $frame = document.getElementById('broadcast-live-frame-border');
    if ($top) $top.style.height = barH + 'px';
    if ($bot) $bot.style.height = barH + 'px';
    if ($frame) $frame.style.height = frameH + 'px';
    // 캐릭터를 16:9 프레임 영역에 클리핑
    var $charWrap = document.querySelector('.character-wrapper');
    if ($charWrap) {
      $charWrap.style.clipPath = 'inset(' + barH + 'px 0px ' + barH + 'px 0px)';
    }
    // 모드 인디케이터 위치를 프레임 내부 좌상단에
    var $ind = document.getElementById('broadcast-mode-indicator');
    if ($ind) {
      $ind.style.top = (barH + 8) + 'px';
      $ind.style.left = '8px';
    }
  }

  function syncLiveVisualState() {
    var ss = saveData.streamerStatus;
    if ($ledText) {
      $ledText.textContent = ss.isLive ? '■STOP' : '▶LIVE';
    }
    if ($btnLive) {
      $btnLive.classList.toggle('is-live', !!ss.isLive);
    }
    if (ss.isLive) {
      if (!liveSessionSnapshot) startLiveSessionSnapshot();
      enterLiveBroadcastView(ss.broadcastMode || 'talk');
    } else {
      exitLiveBroadcastView();
    }
    updateGaugeUI();
  }

  window.syncLiveVisualState = syncLiveVisualState;

  // ── LIVE 토글 (btn-live 클릭) ──
  function toggleLive() {
    var ss = saveData.streamerStatus;
    if (!ss.isLive) {
      openBroadcastModeModal();
    } else {
      stopBroadcast();
    }
  }

  // ── 방송 모드 선택 이벤트 ──
  var $bmBtns = document.querySelectorAll('.broadcast-mode-btn');
  for (var bi = 0; bi < $bmBtns.length; bi++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        var mode = btn.getAttribute('data-mode');
        if (mode) startCountdown(mode);
      });
    })($bmBtns[bi]);
  }

  var $bmClose = document.getElementById('broadcast-mode-close');
  if ($bmClose) $bmClose.addEventListener('click', closeBroadcastModeModal);

  var $bmBackdrop = document.getElementById('broadcast-mode-backdrop');
  if ($bmBackdrop) $bmBackdrop.addEventListener('click', function(e) {
    if (e.target === $bmBackdrop) closeBroadcastModeModal();
  });

  // ── 준비 화면 이벤트 ──
  var $prepBackdrop = document.getElementById('broadcast-prep-backdrop');
  if ($prepBackdrop) $prepBackdrop.addEventListener('click', handlePrepClick);

  var $prepCancel = document.getElementById('broadcast-prep-cancel');
  if ($prepCancel) $prepCancel.addEventListener('click', function(e) {
    e.stopPropagation();
    cancelCountdown();
  });

  var $prepTheme = document.getElementById('broadcast-prep-theme');
  if ($prepTheme) $prepTheme.addEventListener('click', function(e) {
    e.stopPropagation();
    goBackToModeSelect();
  });

  if ($btnLive) {
    $btnLive.addEventListener('click', toggleLive);
  }

  // ── 방송 복귀 처리 (저장 데이터에서 방송 중이었을 때) ──
  syncLiveVisualState();

  window.addEventListener('resize', function() {
    if (document.getElementById('game-container').classList.contains('live-broadcast')) {
      updateLiveOverlays();
    }
  });

  // ── 초기 UI 반영 & 엔진 시작 ──
  updateGaugeUI();
  setInterval(gaugeTick, 1000);

  // ── 탭 복귀 시 즉시 보정 ──
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') {
      gaugeTick();  // 경과 시간만큼 즉시 반영
      tick();       // 배경·시계 갱신
    }
  });
})();

// =========================================================
//  일일 무료 가챠 리셋 — 매일 새벽 5시 기준
// =========================================================
function getDailyResetDateKey() {
  // 새벽 5시 기준 날짜 키: 현재 시각에서 5시간을 빼서 날짜를 결정
  var now = new Date();
  var adjusted = new Date(now.getTime() - 5 * 60 * 60 * 1000);
  var y = adjusted.getFullYear();
  var m = String(adjusted.getMonth() + 1).padStart(2, '0');
  var d = String(adjusted.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

function checkAndResetDailyFreeGacha() {
  var todayKey = getDailyResetDateKey();
  if (!saveData.dailyFreeGacha) {
    saveData.dailyFreeGacha = { count: DAILY_FREE_GACHA_LIMIT, lastResetDate: '' };
  }
  if (saveData.dailyFreeGacha.lastResetDate !== todayKey) {
    saveData.dailyFreeGacha.count = DAILY_FREE_GACHA_LIMIT;
    saveData.dailyFreeGacha.lastResetDate = todayKey;
  } else {
    saveData.dailyFreeGacha.count = Math.max(0, Math.min(DAILY_FREE_GACHA_LIMIT, Math.floor(saveData.dailyFreeGacha.count || 0)));
  }
}

// =========================================================
//  영업(가챠) 시스템 — 진입 모달 + 가변 연차 + SKIP + 천장
// =========================================================
(function () {
  var GACHA_COST = 20000;
  var MAX_SMART_PULL = 10;
  var PITY_THRESHOLD = 100;
  var REFUND = { COMMON: 2000, RARE: 5000, LEGENDARY: 20000 };
  var GRADE_WEIGHTS = { COMMON: 80, RARE: 15, LEGENDARY: 5 };
  var CATEGORY_ITEM_PCT = 98.5;
  var REVEAL_DELAY = 200;

  // Entry DOM
  var $entryBackdrop = document.getElementById('gacha-entry-backdrop');
  var $entryClose = document.getElementById('gacha-entry-close');
  var $pullOneBtn = document.getElementById('gacha-pull-one');
  var $pullSmartBtn = document.getElementById('gacha-pull-smart');
  var $pullOneLabel = $pullOneBtn ? $pullOneBtn.querySelector('.btn-label') : null;
  var $pullSmartLabel = $pullSmartBtn ? $pullSmartBtn.querySelector('.btn-label') : null;
  var $pullOneCostValue = $pullOneBtn ? $pullOneBtn.querySelector('.cost-value') : null;
  var $pullSmartCostValue = $pullSmartBtn ? $pullSmartBtn.querySelector('.cost-value') : null;
  var $dailyGachaBubble = document.getElementById('daily-gacha-bubble');

  // Result DOM
  var $backdrop = document.getElementById('gacha-backdrop');
  var $grid = document.getElementById('gacha-grid');
  var $skipBtn = document.getElementById('gacha-skip');
  var $pityInfo = document.getElementById('gacha-pity-info');
  var $bottomBtns = document.getElementById('gacha-bottom-btns');
  var $retryBtn = document.getElementById('gacha-retry');
  var $confirmBtn = document.getElementById('gacha-confirm');

  var revealTimers = [];
  var isAnimating = false;
  var lastPullCount = 0;

  function getSmartPullPreset(earnings) {
    // 무료 횟수가 남아있으면 무조건 10연차
    checkAndResetDailyFreeGacha();
    var freeCount = saveData.dailyFreeGacha ? saveData.dailyFreeGacha.count : 0;
    if (freeCount > 0) {
      return { count: MAX_SMART_PULL, cost: GACHA_COST * MAX_SMART_PULL };
    }
    // 2000~9999 구간에서만 n회 가변 표기
    if (earnings >= 2 * GACHA_COST && earnings < MAX_SMART_PULL * GACHA_COST) {
      var n = Math.floor(earnings / GACHA_COST);
      return { count: n, cost: n * GACHA_COST };
    }
    // 그 외 구간은 고정 10회 목표 표기
    return { count: MAX_SMART_PULL, cost: GACHA_COST * MAX_SMART_PULL };
  }

  function setEntryButtonState($btn, $label, labelText, $costValue, costText, neededCost, currentEarnings) {
    if ($label) $label.textContent = labelText;
    if ($costValue) $costValue.textContent = costText;
    var isEnough = currentEarnings >= neededCost;
    $btn.disabled = !isEnough;
    $btn.classList.toggle('show-insufficient', !isEnough);
  }

  function formatCost(value) {
    return Math.max(0, Math.floor(value || 0)).toLocaleString('ko-KR');
  }

  function syncDailyGachaBubble() {
    if (!$dailyGachaBubble) return;
    checkAndResetDailyFreeGacha();
    var freeCount = saveData.dailyFreeGacha ? saveData.dailyFreeGacha.count : 0;
    $dailyGachaBubble.style.display = freeCount >= 1 ? 'inline-block' : 'none';
  }

  window.syncDailyGachaBubble = syncDailyGachaBubble;

  function updateEntryButtons() {
    checkAndResetDailyFreeGacha();
    var earnings = Math.max(0, Math.floor(saveData.streamerStatus.earnings || 0));
    var freeCount = saveData.dailyFreeGacha ? saveData.dailyFreeGacha.count : 0;
    var smartPreset = getSmartPullPreset(earnings);

    syncDailyGachaBubble();

    setEntryButtonState(
      $pullOneBtn,
      $pullOneLabel,
      '1번 뽑기',
      $pullOneCostValue,
      formatCost(GACHA_COST),
      GACHA_COST,
      earnings
    );

    // 10연차: 무료 횟수가 남아있으면 무조건 활성화
    if (freeCount > 0) {
      if ($pullSmartLabel) $pullSmartLabel.textContent = '10번 뽑기';
      if ($pullSmartCostValue) $pullSmartCostValue.textContent = '무료 ' + freeCount + '/' + DAILY_FREE_GACHA_LIMIT;
      $pullSmartBtn.disabled = false;
      $pullSmartBtn.classList.remove('show-insufficient');
    } else {
      setEntryButtonState(
        $pullSmartBtn,
        $pullSmartLabel,
        smartPreset.count + '번 뽑기',
        $pullSmartCostValue,
        formatCost(smartPreset.cost),
        smartPreset.cost,
        earnings
      );
    }
  }

  function openEntryModal() {
    updateEntryButtons();
    $entryBackdrop.classList.add('show');
  }

  function closeEntryModal() {
    $entryBackdrop.classList.remove('show');
  }

  function pickGrade() {
    var r = Math.random() * 100;
    if (r < GRADE_WEIGHTS.COMMON) return 'COMMON';
    if (r < GRADE_WEIGHTS.COMMON + GRADE_WEIGHTS.RARE) return 'RARE';
    return 'LEGENDARY';
  }

  function pickFromPool(pool, grade) {
    var filtered = pool.filter(function (item) { return item.grade === grade; });
    if (filtered.length === 0) filtered = pool;
    return filtered[Math.floor(Math.random() * filtered.length)];
  }

  function rollOnce(forceCostume) {
    var isCostume = forceCostume ? true : (Math.random() * 100 >= CATEGORY_ITEM_PCT);
    var grade = pickGrade();
    var result;

    if (isCostume && masterCostumes.length > 0) {
      result = pickFromPool(masterCostumes, grade);
      return { item: result, type: 'COSTUME' };
    }

    result = pickFromPool(masterConsumables, grade);
    return { item: result, type: 'CONSUMABLE' };
  }

  function executeGacha(pullCount, shouldUpdatePity) {
    var results = [];
    for (var i = 0; i < pullCount; i++) {
      var forceCostume = false;
      if (shouldUpdatePity) {
        saveData.pityCount = (saveData.pityCount || 0) + 1;
        forceCostume = saveData.pityCount >= PITY_THRESHOLD;
      }
      var roll = rollOnce(forceCostume);

      if (shouldUpdatePity && roll.type === 'COSTUME') {
        saveData.pityCount = 0;
      }

      results.push(roll);
    }
    return results;
  }

  function applyResults(results) {
    results.forEach(function (r) {
      r._isNew = false;
      r._refund = 0;

      if (r.type === 'COSTUME') {
        var alreadyOwned = saveData.ownedCostumes.indexOf(r.item.id) !== -1;
        if (alreadyOwned) {
          var refundAmount = REFUND[r.item.grade] || 10;
          saveData.streamerStatus.earnings += refundAmount;
          r._refund = refundAmount;
        } else {
          saveData.ownedCostumes.push(r.item.id);
          r._isNew = true;
        }
      } else {
        var entry = saveData.inventory.consumables.find(function (c) { return c.id === r.item.id; });
        if (entry) {
          entry.quantity += 1;
        } else {
          saveData.inventory.consumables.push({ id: r.item.id, quantity: 1 });
        }
      }
    });
  }

  function getIconSrc(r) {
    return 'assets/' + r.item.id + '.png';
  }

  function buildSlot(r) {
    var slot = document.createElement('div');
    slot.className = 'gacha-slot grade-' + r.item.grade.toLowerCase();
    if (r.type === 'COSTUME') slot.classList.add('is-costume');

    var icon = document.createElement('img');
    icon.className = 'gacha-slot-icon';
    icon.src = getIconSrc(r);
    icon.alt = r.item.name;
    icon.draggable = false;
    slot.appendChild(icon);

    var nameEl = document.createElement('div');
    nameEl.className = 'gacha-slot-name';
    nameEl.textContent = r.item.name;
    slot.appendChild(nameEl);

    if (r._isNew) {
      var badge = document.createElement('div');
      badge.className = 'gacha-new-badge';
      badge.textContent = 'NEW';
      slot.appendChild(badge);
    }

    if (r._refund > 0) {
      var refBadge = document.createElement('div');
      refBadge.className = 'gacha-refund-badge';
      refBadge.textContent = '+' + r._refund;
      slot.appendChild(refBadge);
    }

    return slot;
  }

  function updatePityInfo() {
    var pity = Math.max(0, Math.floor(saveData.pityCount || 0));
    var remain = PITY_THRESHOLD - pity;
    if (remain <= 0) remain = PITY_THRESHOLD;
    $pityInfo.textContent = '의상 확정까지 ' + remain + '회 남음';
  }

  function setPityInfoVisible(visible) {
    if (!$pityInfo) return;
    $pityInfo.style.display = visible ? 'block' : 'none';
  }

  function updateBottomButtons() {
    var shouldShowRetry = (lastPullCount === 1 || lastPullCount === 10);

    $bottomBtns.classList.add('show');
    $bottomBtns.classList.toggle('confirm-only', !shouldShowRetry);

    if (shouldShowRetry) {
      checkAndResetDailyFreeGacha();
      var freeCount = saveData.dailyFreeGacha ? saveData.dailyFreeGacha.count : 0;
      var retryCost = lastPullCount * GACHA_COST;
      var canFree = (lastPullCount === 10 && freeCount > 0);
      var isInsufficient = !canFree && (saveData.streamerStatus.earnings < retryCost);

      var retryLabel = '다시 뽑기 (' + lastPullCount + '회)';
      var retryBadge = '<span class="gacha-insufficient-badge">자금 부족</span>';
      if (canFree) {
        retryLabel = '다시 뽑기 (10회·무료 ' + freeCount + '/' + DAILY_FREE_GACHA_LIMIT + ')';
      }
      $retryBtn.innerHTML = retryLabel + retryBadge;
      $retryBtn.disabled = isInsufficient;
      $retryBtn.classList.toggle('show-insufficient', lastPullCount === 10 && isInsufficient);
    }
  }

  function revealSequence(slots) {
    isAnimating = true;
    setPityInfoVisible(false);
    $bottomBtns.classList.remove('show');
    revealTimers = [];

    slots.forEach(function (slot, idx) {
      var timer = setTimeout(function () {
        slot.classList.add('revealed');
        if (idx === slots.length - 1) {
          finishReveal();
        }
      }, idx * REVEAL_DELAY);
      revealTimers.push(timer);
    });
  }

  function finishReveal() {
    isAnimating = false;
    updatePityInfo();
    setPityInfoVisible(true);
    updateBottomButtons();
  }

  function skipReveal() {
    revealTimers.forEach(clearTimeout);
    revealTimers = [];
    var slots = $grid.querySelectorAll('.gacha-slot');
    slots.forEach(function (s) { s.classList.add('revealed'); });
    finishReveal();
  }

  function runGacha(pullCount) {
    checkAndResetDailyFreeGacha();
    var totalCost = pullCount * GACHA_COST;
    var ss = saveData.streamerStatus;
    var usedFree = false;

    // 10연차이고 무료 횟수가 남아있으면 무료 사용
    if (pullCount === 10 && saveData.dailyFreeGacha && saveData.dailyFreeGacha.count > 0) {
      saveData.dailyFreeGacha.count--;
      usedFree = true;
      totalCost = 0;
    }

    syncDailyGachaBubble();

    if (!usedFree && ss.earnings < totalCost) {
      alert('방송 자금이 부족합니다! (필요: ' + totalCost + ')');
      return false;
    }

    // 실행 직전 저장
    saveGame();

    if (!usedFree) {
      ss.earnings -= totalCost;
    }

    // 재화 차감 직후 저장
    saveGame();

    var results = executeGacha(pullCount, !usedFree);
    applyResults(results);

    syncDailyGachaBubble();

    // 결과 반영 완료 저장
    saveGame();

    lastPullCount = pullCount;

    $grid.innerHTML = '';
    var slots = [];
    results.forEach(function (r) {
      var slot = buildSlot(r);
      $grid.appendChild(slot);
      slots.push(slot);
    });

    revealSequence(slots);
    return true;
  }

  function openResultModal() {
    setPityInfoVisible(false);
    $backdrop.classList.add('show');
  }

  function closeResultModal() {
    revealTimers.forEach(clearTimeout);
    revealTimers = [];
    isAnimating = false;
    $backdrop.classList.remove('show');
    $bottomBtns.classList.remove('show');
    $bottomBtns.classList.remove('confirm-only');
    setPityInfoVisible(false);
    $grid.innerHTML = '';
  }

  function startGachaFlow(pullCount) {
    closeEntryModal();
    openResultModal();

    var ok = runGacha(pullCount);
    if (!ok) {
      closeResultModal();
    }
  }

  document.getElementById('btn-gacha').addEventListener('click', function () {
    openEntryModal();
  });

  if ($entryClose) {
    $entryClose.addEventListener('click', function () {
      closeEntryModal();
    });
  }

  if ($entryBackdrop) {
    $entryBackdrop.addEventListener('click', function (e) {
      if (e.target === $entryBackdrop) closeEntryModal();
    });
  }

  if ($pullOneBtn) {
    $pullOneBtn.addEventListener('click', function () {
      if ($pullOneBtn.disabled) return;
      startGachaFlow(1);
    });
  }

  if ($pullSmartBtn) {
    $pullSmartBtn.addEventListener('click', function () {
      if ($pullSmartBtn.disabled) return;
      var earnings = Math.max(0, Math.floor(saveData.streamerStatus.earnings || 0));
      var preset = getSmartPullPreset(earnings);
      if (preset.count > 0) startGachaFlow(preset.count);
    });
  }

  if ($skipBtn) {
    $skipBtn.addEventListener('click', function () {
      if (isAnimating) skipReveal();
    });
  }

  if ($confirmBtn) {
    $confirmBtn.addEventListener('click', function () {
      closeResultModal();
    });
  }

  if ($retryBtn) {
    $retryBtn.addEventListener('click', function () {
      if ($retryBtn.disabled) return;
      if (!(lastPullCount === 1 || lastPullCount === 10)) return;

      revealTimers.forEach(clearTimeout);
      revealTimers = [];
      isAnimating = false;
      $bottomBtns.classList.remove('show');
      runGacha(lastPullCount);
    });
  }

  if ($backdrop) {
    $backdrop.addEventListener('click', function (e) {
      if (e.target === $backdrop && !isAnimating) closeResultModal();
    });
  }
})();

// =========================================================
//  옷장(세팅) 시스템 — Wardrobe
// =========================================================
(function () {
  var $wardrobeBackdrop = document.getElementById('wardrobe-backdrop');
  var $wardrobeGrid = document.getElementById('wardrobe-grid');
  var $wardrobeCancel = document.getElementById('wardrobe-cancel');
  var $wardrobeConfirm = document.getElementById('wardrobe-confirm');
  var $dailyCheck = document.getElementById('wardrobe-daily-check');
  var $dailyLabel = document.getElementById('wardrobe-daily-label');
  var $setInfo = document.getElementById('wardrobe-set-info');

  // Preview elements
  var $previewClothes = document.getElementById('wardrobe-clothes');
  var $previewHead = document.getElementById('wardrobe-head');

  // State
  var currentTab = 'head';
  var currentFilter = 'all';
  var previewHead = '';
  var previewBody = '';
  var savedHead = '';
  var savedBody = '';

  function getTodayKey() {
    var now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  }

  function isOwned(costumeId) {
    return saveData.ownedCostumes.indexOf(costumeId) !== -1;
  }

  function getCostumesForTab(tab) {
    return masterCostumes.filter(function(c) { return c.part === tab; });
  }

  function updatePreview() {
    if (previewBody) {
      $previewClothes.src = 'assets/' + previewBody + '.png';
      $previewClothes.style.display = '';
    } else {
      $previewClothes.src = '';
      $previewClothes.style.display = 'none';
    }
    if (previewHead) {
      $previewHead.src = 'assets/' + previewHead + '.png';
      $previewHead.style.display = '';
    } else {
      $previewHead.src = '';
      $previewHead.style.display = 'none';
    }
    updateSetBonusInfo();
  }

  function updateSetBonusInfo() {
    if (!$setInfo) return;
    var headCostume = previewHead ? masterCostumes.find(function(c) { return c.id === previewHead; }) : null;
    var bodyCostume = previewBody ? masterCostumes.find(function(c) { return c.id === previewBody; }) : null;
    if (headCostume && bodyCostume && headCostume.set_id && headCostume.set_id === bodyCostume.set_id) {
      var setBonus = (masterSetBonuses || []).find(function(s) { return s.set_id === headCostume.set_id; });
      if (setBonus) {
        $setInfo.textContent = '\uC138\uD2B8: ' + setBonus.name + ' \u2014 \uD150\uC158 \uC18C\uBAA8 -' + Math.round(setBonus.buffValue * 100) + '%';
        $setInfo.classList.add('show');
        return;
      }
    }
    $setInfo.classList.remove('show');
  }

  function renderGrid() {
    $wardrobeGrid.innerHTML = '';
    var costumes = getCostumesForTab(currentTab);
    var previewId = (currentTab === 'head') ? previewHead : previewBody;
    var equippedId = (currentTab === 'head') ? savedHead : savedBody;

    costumes.forEach(function(costume) {
      var owned = isOwned(costume.id);
      if (currentFilter === 'owned' && !owned) return;

      var slot = document.createElement('div');
      slot.className = 'wardrobe-slot grade-' + costume.grade.toLowerCase();
      if (!owned) slot.classList.add('not-owned');
      if (costume.id === equippedId) slot.classList.add('equipped');
      if (costume.id === previewId) slot.classList.add('previewing');

      var icon = document.createElement('img');
      icon.className = 'wardrobe-slot-icon';
      icon.src = 'assets/' + costume.id + '.png';
      icon.alt = costume.name;
      icon.draggable = false;
      slot.appendChild(icon);

      var nameEl = document.createElement('div');
      nameEl.className = 'wardrobe-slot-name';
      nameEl.textContent = costume.name;
      slot.appendChild(nameEl);

      if (costume.buffValue > 0) {
        var buffEl = document.createElement('div');
        buffEl.className = 'wardrobe-slot-buff';
        buffEl.textContent = '+' + Math.round(costume.buffValue * 100) + '%';
        slot.appendChild(buffEl);
      }

      if (owned) {
        slot.addEventListener('click', function() {
          if (currentTab === 'head') {
            previewHead = costume.id;
          } else {
            previewBody = costume.id;
          }
          renderGrid();
          updatePreview();
        });
      }

      $wardrobeGrid.appendChild(slot);
    });
  }

  function openWardrobe() {
    if (saveData.streamerStatus.isLive) return;

    savedHead = saveData.equippedHead || '';
    savedBody = saveData.equippedBody || '';
    previewHead = savedHead;
    previewBody = savedBody;

    var todayKey = getTodayKey();
    var alreadyUsed = (saveData.dailyStylingDate === todayKey);
    $dailyCheck.checked = false;
    $dailyCheck.disabled = alreadyUsed;
    $dailyLabel.classList.toggle('disabled', alreadyUsed);

    var $charWrap = document.querySelector('.character-wrapper');
    if ($charWrap) $charWrap.style.display = 'none';

    currentTab = 'head';
    currentFilter = 'all';
    syncTabUI();
    syncFilterUI();
    updatePreview();
    renderGrid();

    $wardrobeBackdrop.classList.add('show');
  }

  function closeWardrobe() {
    $wardrobeBackdrop.classList.remove('show');
    var $charWrap = document.querySelector('.character-wrapper');
    if ($charWrap) $charWrap.style.display = '';
  }

  function cancelWardrobe() {
    previewHead = savedHead;
    previewBody = savedBody;
    closeWardrobe();
  }

  function confirmWardrobe() {
    saveData.equippedHead = previewHead;
    saveData.equippedBody = previewBody;
    syncCostumeVisuals();

    if ($dailyCheck.checked && !$dailyCheck.disabled) {
      var todayKey = getTodayKey();
      saveData.dailyStylingDate = todayKey;
      saveData.streamerStatus.tension = 100;
      saveData.currentExp = (saveData.currentExp || 0) + 100;
    }

    saveGame();
    closeWardrobe();
  }

  function syncTabUI() {
    var tabs = document.querySelectorAll('.wardrobe-tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === currentTab);
    }
  }

  function syncFilterUI() {
    var filters = document.querySelectorAll('.wardrobe-filter');
    for (var i = 0; i < filters.length; i++) {
      filters[i].classList.toggle('active', filters[i].getAttribute('data-filter') === currentFilter);
    }
  }

  // Events
  var $btnCloset = document.getElementById('btn-closet');
  if ($btnCloset) {
    $btnCloset.addEventListener('click', openWardrobe);
  }

  if ($wardrobeCancel) {
    $wardrobeCancel.addEventListener('click', cancelWardrobe);
  }

  if ($wardrobeConfirm) {
    $wardrobeConfirm.addEventListener('click', confirmWardrobe);
  }

  var $tabs = document.querySelectorAll('.wardrobe-tab');
  for (var i = 0; i < $tabs.length; i++) {
    (function(tab) {
      tab.addEventListener('click', function() {
        currentTab = tab.getAttribute('data-tab');
        syncTabUI();
        renderGrid();
      });
    })($tabs[i]);
  }

  var $filters = document.querySelectorAll('.wardrobe-filter');
  for (var i = 0; i < $filters.length; i++) {
    (function(filter) {
      filter.addEventListener('click', function() {
        currentFilter = filter.getAttribute('data-filter');
        syncFilterUI();
        renderGrid();
      });
    })($filters[i]);
  }
})();

// =========================================================
//  소통(터치) 시스템 — Energy, Judgment, Dialogue, VFX
// =========================================================
(function () {
  // ── 상수 ──
  var MAX_ENERGY = 5;
  var ENERGY_RECHARGE_SEC = 7200; // 2시간 (초)
  var DAILY_TENSION_CAP = 200;
  var SUCCESS_TENSION = 20;
  var GREAT_SUCCESS_TENSION = 40;
  var GREAT_SUCCESS_RATE = 0.20;
  var TYPEWRITER_SPEED = 50;   // ms per char
  var DIALOGUE_LINGER = 1500;  // ms after typing finishes
  var FADEOUT_DURATION = 400;  // ms

  // ── 대사 데이터 (더미 배열 — 기획자가 수정 가능) ──
  var dialogues = {
    success: [
      "네...넵. 힘낼게요...",
      "칭찬해 주셔서 감사합니다...",
      "그렇게 말씀해주시니 좀 낫네요..."
    ],
    great_success: [
      "... 더 열심히 할게요...!!!",
      "그렇게까지 말씀해주시다니... 감사합니다...",
      "에헤헤... 저, 정말 기뻐요..."
    ],
    bored: [
      "스, 슬슬 방송하러 가야 할 것 같아요...",
      "...(딴청)",
      "...(먼 산을 본다)"
    ]
  };

  // ── DOM ──
  var $dialogueBox = document.getElementById('touch-dialogue-box');
  var $dialogueText = document.getElementById('touch-dialogue-text');
  var $dialogueResult = document.getElementById('touch-dialogue-result');
  var $debugUI = document.getElementById('touch-debug-ui');
  var $gameContainer = document.getElementById('game-container');

  // ── 타이머 ──
  var typewriterTimer = null;
  var dialogueFadeTimer = null;
  var dialogueHideTimer = null;
  var touchCooldown = false;

  // ── 유틸 ──
  function getTouchDailyKey() {
    var now = new Date();
    return now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0');
  }

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function ensureTouchSystem() {
    if (!saveData.touchSystem || typeof saveData.touchSystem !== 'object') {
      saveData.touchSystem = {
        currentEnergy: MAX_ENERGY,
        lastRechargeTime: 0,
        dailyTensionRecovered: 0,
        dailyTouchResetDate: ''
      };
    }
    return saveData.touchSystem;
  }

  // ── 에너지 충전 (오프라인 보상 포함) ──
  function rechargeEnergy() {
    var ts = ensureTouchSystem();
    if (ts.currentEnergy >= MAX_ENERGY) {
      ts.lastRechargeTime = 0;
      return;
    }
    var now = Date.now();
    if (ts.lastRechargeTime <= 0) {
      ts.lastRechargeTime = now;
      return;
    }
    var elapsedMs = now - ts.lastRechargeTime;
    var recharged = Math.floor(elapsedMs / (ENERGY_RECHARGE_SEC * 1000));
    if (recharged > 0) {
      ts.currentEnergy = Math.min(MAX_ENERGY, ts.currentEnergy + recharged);
      ts.lastRechargeTime += recharged * ENERGY_RECHARGE_SEC * 1000;
      if (ts.currentEnergy >= MAX_ENERGY) {
        ts.lastRechargeTime = 0;
      }
    }
  }

  // ── 일일 리셋 (매일 00시) ──
  function checkDailyReset() {
    var ts = ensureTouchSystem();
    var todayKey = getTouchDailyKey();
    if (ts.dailyTouchResetDate !== todayKey) {
      ts.dailyTensionRecovered = 0;
      ts.dailyTouchResetDate = todayKey;
    }
  }

  // ── 디버그 UI 갱신 ──
  function updateDebugUI() {
    var ts = ensureTouchSystem();
    rechargeEnergy();
    checkDailyReset();
    if ($debugUI) {
      $debugUI.textContent = 'EN: ' + ts.currentEnergy + '/' + MAX_ENERGY +
        '  Daily: ' + ts.dailyTensionRecovered + '/' + DAILY_TENSION_CAP;
    }
  }

  // ── 대사창 초기화 ──
  function clearDialogue() {
    if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
    if (dialogueFadeTimer) { clearTimeout(dialogueFadeTimer); dialogueFadeTimer = null; }
    if (dialogueHideTimer) { clearTimeout(dialogueHideTimer); dialogueHideTimer = null; }
    $dialogueBox.classList.remove('show');
    $dialogueText.textContent = '';
    $dialogueResult.textContent = '';
    $dialogueResult.className = 'touch-dialogue-result';
  }

  // ── 대사창 표시 (타이프라이터 + 페이드아웃) ──
  function showDialogue(text, resultType) {
    clearDialogue();

    // 결과 레이블
    var resultLabel = '';
    var resultClass = '';
    if (resultType === 'success') { resultLabel = 'SUCCESS'; resultClass = 'success'; }
    else if (resultType === 'great_success') { resultLabel = 'GREAT!'; resultClass = 'great-success'; }
    else if (resultType === 'bored') { resultLabel = '...'; resultClass = 'bored'; }

    $dialogueResult.textContent = resultLabel;
    $dialogueResult.className = 'touch-dialogue-result ' + resultClass;

    // 페이드인
    void $dialogueBox.offsetWidth; // force reflow
    $dialogueBox.classList.add('show');

    // 타이프라이터 효과
    var charIndex = 0;
    $dialogueText.textContent = '';
    typewriterTimer = setInterval(function () {
      if (charIndex < text.length) {
        $dialogueText.textContent += text.charAt(charIndex);
        charIndex++;
      } else {
        clearInterval(typewriterTimer);
        typewriterTimer = null;
        // 잠시 유지 후 페이드아웃
        dialogueFadeTimer = setTimeout(function () {
          $dialogueBox.classList.remove('show');
          dialogueHideTimer = setTimeout(function () {
            $dialogueText.textContent = '';
          }, FADEOUT_DURATION + 50);
        }, DIALOGUE_LINGER);
      }
    }, TYPEWRITER_SPEED);
  }

  // ── 하트 이펙트 ──
  function spawnHeart(x, y, isGreat) {
    var heart = document.createElement('div');
    heart.className = 'touch-heart' + (isGreat ? ' great' : '');
    heart.textContent = '\u2764\uFE0F';

    var offsetX = (Math.random() - 0.5) * 80;
    var offsetY = (Math.random() - 0.5) * 40;
    heart.style.left = (x + offsetX) + 'px';
    heart.style.top = (y + offsetY) + 'px';

    $gameContainer.appendChild(heart);
    var duration = isGreat ? 1400 : 1200;
    setTimeout(function () {
      if (heart.parentNode) heart.parentNode.removeChild(heart);
    }, duration);
  }

  function spawnHearts(x, y, resultType) {
    if (resultType === 'success') {
      var countS = 1 + Math.floor(Math.random() * 2); // 1~2
      for (var i = 0; i < countS; i++) {
        spawnHeart(x, y, false);
      }
    } else if (resultType === 'great_success') {
      var countG = 4 + Math.floor(Math.random() * 2); // 4~5
      for (var j = 0; j < countG; j++) {
        spawnHeart(x, y, true);
      }
    }
    // bored: 하트 없음
  }

  // ── 터치 판정 ──
  function processTouchJudgment(clickX, clickY) {
    if (touchCooldown) return;

    var ts = ensureTouchSystem();
    rechargeEnergy();
    checkDailyReset();

    var resultType;
    var tensionGain = 0;

    // 1. 에너지 체크
    if (ts.currentEnergy <= 0) {
      resultType = 'bored';
    }
    // 2. 일일 제한 체크
    else if (ts.dailyTensionRecovered >= DAILY_TENSION_CAP) {
      resultType = 'bored';
    }
    // 3. 확률 판정 (에너지 1 이상)
    else {
      // 에너지 소모
      ts.currentEnergy--;
      if (ts.currentEnergy < MAX_ENERGY && ts.lastRechargeTime <= 0) {
        ts.lastRechargeTime = Date.now();
      }

      // 대성공 20% / 성공 80%
      if (Math.random() < GREAT_SUCCESS_RATE) {
        resultType = 'great_success';
        tensionGain = GREAT_SUCCESS_TENSION;
      } else {
        resultType = 'success';
        tensionGain = SUCCESS_TENSION;
      }

      // 4. 일일 상한 보정
      var remaining = DAILY_TENSION_CAP - ts.dailyTensionRecovered;
      if (tensionGain > remaining) {
        tensionGain = remaining;
      }

      // 5. 텐션 반영
      var ss = saveData.streamerStatus;
      ss.tension = Math.min(100, ss.tension + tensionGain);

      // 일일 회복량 기록
      ts.dailyTensionRecovered += tensionGain;

      // 인연 경험치 (유효 소통 시 텐션량만큼 증가)
      if (tensionGain > 0) {
        saveData.currentExp = (saveData.currentExp || 0) + tensionGain;
      }
    }

    // 쿨타임
    touchCooldown = true;
    setTimeout(function () { touchCooldown = false; }, 500);

    // 시각적 연출
    var dialogue = pickRandom(dialogues[resultType]);
    showDialogue(dialogue, resultType);
    spawnHearts(clickX, clickY, resultType);

    updateDebugUI();
    saveGame();
  }

  // ── 소통 모드 클릭 핸들러 ──
  $gameContainer.addEventListener('click', function (e) {
    if (!isTouchMode) return;
    if (e.target.closest('.mb, .mbw, #mo, #top-hud, .touch-dialogue-box, .touch-debug-ui')) return;
    if (e.target.closest('[class*="backdrop"]')) return;

    var rect = $gameContainer.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;

    processTouchJudgment(x, y);
  });

  // ── 소통 모드 종료 시 대사창 닫기 ──
  var origTouchBtn = document.getElementById('btn-touch');
  if (origTouchBtn) {
    origTouchBtn.addEventListener('click', function () {
      if (!$gameContainer.classList.contains('touch-mode')) {
        clearDialogue();
      }
    });
  }

  // ── 주기적 디버그 UI 갱신 (에너지 충전 실시간 반영) ──
  setInterval(updateDebugUI, 1000);

  // ── 초기화 ──
  ensureTouchSystem();
  rechargeEnergy();
  checkDailyReset();
  updateDebugUI();
})();
</script>
